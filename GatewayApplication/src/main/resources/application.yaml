spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - TokenRelay
            - AddRequestHeader=X-Trusted-Gateway, true

          routes:
            - id: auction
              uri: ${AUCTION_URL:http://localhost:8081}
              predicates:
                - Path=/api/auctions/**
              filters:
                - StripPrefix=0

            - id: bid
              uri: ${BID_URL:http://localhost:8085}
              predicates:
                - Path=/api/bids/**
              filters:
                - StripPrefix=0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9191/realms/auctionrealm}

server:
  port: ${GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
