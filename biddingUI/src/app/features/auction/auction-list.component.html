<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Auctions</h2>

        <input
            type="text"
            class="form-control w-25"
            placeholder="Search auctions..."
            [(ngModel)]="query"
            (input)="onSearch()"
        />
    </div>

    <ul class="nav nav-pills mb-4">
        <li class="nav-item">
            <button
                class="nav-link"
                [class.active]="status === AuctionStatus.OPEN"
                (click)="changeStatus(AuctionStatus.OPEN)"
            >
                Live
            </button>
        </li>

        <li class="nav-item">
            <button
                class="nav-link"
                [class.active]="status === AuctionStatus.DRAFT"
                (click)="changeStatus(AuctionStatus.DRAFT)"
            >
                Upcoming
            </button>
        </li>

        <li class="nav-item">
            <button
                class="nav-link"
                [class.active]="status === AuctionStatus.CLOSED"
                (click)="changeStatus(AuctionStatus.CLOSED)"
            >
                Completed
            </button>
        </li>
    </ul>

    @if (loading) {
        <div class="text-center mt-5">
            <div class="spinner-border" role="status"></div>
        </div>
    } @else {
        <div class="row">
            @if (auctions.length === 0) {
                <div class="col-12 text-center text-muted mt-5">No auctions found.</div>
            }

            @for (auction of auctions; track auction.uid) {
                <div class="col-lg-4 col-md-6 mb-4">
                    <app-auction-card [auction]="auction"> </app-auction-card>
                </div>
            }
        </div>

        @if (data.totalPages > 0) {
            <div class="d-flex justify-content-center align-items-center gap-3 mt-4">
                <button
                    class="btn btn-outline-dark"
                    [disabled]="!data.hasPrevious"
                    (click)="previousPage()"
                >
                    Previous
                </button>

                <span> Page {{ data.pageNumber }} of {{ data.totalPages }} </span>

                <button
                    class="btn btn-outline-dark"
                    [disabled]="!data.hasNext"
                    (click)="nextPage()"
                >
                    Next
                </button>
            </div>
        }
    }
</div>
