<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Live Auctions</h2>

        <input
            type="text"
            class="form-control w-25"
            placeholder="Search auctions..."
            [(ngModel)]="query"
            (keyup.enter)="loadAuctions()"
        />
    </div>

    @if (loading) {
        <div class="text-center mt-5">
            <div class="spinner-border" role="status"></div>
        </div>

    } @else {
        <div class="row">
            @for (auction of auctions; track auction.id) {
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="card-title">
                                {{ auction.title }}
                            </h5>

                            <p class="card-text">
                                {{ auction.description }}
                            </p>

                            <p>
                                <strong> Highest Bid: </strong>
                                ₹{{ auction.currentHighestBid }}
                            </p>

                            <p>
                                <strong> Status: </strong>
                                {{ auction.status }}
                            </p>

                            <a class="btn btn-dark w-100" [routerLink]="['/auction', auction.id]">
                                View Auction
                            </a>
                        </div>
                    </div>
                </div>
            }
        </div>

        <div class="d-flex justify-content-center gap-3 mt-4">
            <button class="btn btn-outline-dark" (click)="previousPage()">
                Previous
            </button>

            <span class="mt-2">
                Page {{ page }}
            </span>

            <button class="btn btn-outline-dark" (click)="nextPage()">
                Next
            </button>
        </div>
    }
</div>
