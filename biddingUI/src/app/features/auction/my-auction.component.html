<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Auctions</h2>
        <a class="btn btn-dark" routerLink="/auction/create">
            Create Auction
        </a>
    </div>

    @if (loading) {
        <div class="text-center mt-5">
            <div class="spinner-border" role="status"></div>
        </div>

    } @else {
        <div class="row">
            @for (auction of auctions; track auction.uid) {
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <h5>
                                    {{ auction.title }}
                                </h5>

                                <span class="badge bg-dark">
                                    {{ auction.status }}
                                </span>
                            </div>

                            <p class="mt-3">
                                {{ auction.description }}
                            </p>

                            <div class="d-flex gap-2 mt-4">
                                <a class="btn btn-dark w-100" [routerLink]="['/auctions', auction.uid]">
                                    View
                                </a>

                                <button class="btn btn-outline-danger" (click)="deleteAuction(auction.uid)" >
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            }
        </div>

        <div class="d-flex justify-content-center gap-3 mt-4">
            <button class="btn btn-outline-dark" (click)="previousPage()">
                Previous
            </button>

            <span class="mt-2">
                Page {{ page }}
            </span>

            <button class="btn btn-outline-dark" (click)="nextPage()">
                Next
            </button>
        </div>
    }
</div>
