<div class="card shadow-sm border-0 mt-4">
    <div class="card-body">
        <h5 class="mb-3">Place Bid</h5>

        <div class="mb-3">
            <input
                type="number"
                class="form-control"
                placeholder="Enter bid amount"
                [(ngModel)]="amount"
            />
        </div>

        @if (errorMessage) {
            <div class="alert alert-danger">
                {{ errorMessage }}
            </div>
        }

        @if (successMessage) {
            <div class="alert alert-success">
                {{ successMessage }}
            </div>
        }
        <button class="btn btn-dark w-100" [disabled]="loading" (click)="placeBid()">
            @if (loading) {
                <span class="spinner-border spinner-border-sm"> </span>
            }
            Place Bid
        </button>
    </div>
</div>
