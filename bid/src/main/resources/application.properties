spring.application.name=bid
server.port=8085
server.shutdown=GRACEFUL

bid.pageSize=10
bid.auction-exchange=auction.exchange
bid.auction.queue=bid.auction.events
bid.auction.queue.dlq=bid.auction.events.dlq

#metrics
management.endpoints.web.exposure.include=*
management.metrics.tags.application=${spring.application.name}
management.tracing.enabled=false
management.tracing.sampling.probability=1.0

#swagger.api-gateway-url=http://localhost:8989/auction

#service
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:http://localhost:9191/realms/auctionrealm}

#client
spring.security.oauth2.client.registration.keycloak.client-id=bid-service
spring.security.oauth2.client.registration.keycloak.client-secret=wbJ5ot641oUcOp7U26zAx2eCyaB2EbVS
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak.scope=openid
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:9191/realms/auctionrealm


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:25432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1212}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:1212}

resilience4j.retry.backends.auctionService.max-attempts=2
resilience4j.retry.backends.auctionService.wait-duration=1s

resilience4j.circuitbreaker.backends.auctionService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.backends.auctionService.sliding-window-size=6
resilience4j.circuitbreaker.backends.auctionService.minimum-number-of-calls=4
resilience4j.circuitbreaker.backends.auctionService.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.backends.auctionService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.backends.auctionService.failure-rate-threshold=50
